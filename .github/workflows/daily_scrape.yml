name: Daily Real Estate Scraper
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check end date
        run: |
          END_DATE="2026-09-01"
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "$END_DATE" ]]; then
            echo "Scheduled run expired on $END_DATE. Today is $TODAY. Exiting."
            exit 0
          fi
          echo "Date check passed. Proceeding with scraper."
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipelines/real_estate_scraper.py
